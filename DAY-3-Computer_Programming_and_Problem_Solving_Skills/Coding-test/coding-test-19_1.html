<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>แบบทดสอบที่ 19.1</title>
    </head>
    <body>
        <h1>
            ให้รับข้อมูลผ่านทาง Input คะแนนของผู้เรียนเข้ามาผ่านทางคีย์บอร์ด
            หากคะแนนตั้งแต่ 90 คะแนนขึ้นไป จะได้เกรด 4
        </h1>
        <script>
            let score = Number(prompt("กรุณากรอกคะแนน: "))
            if (score >= 90) {
                console.log(4)
            }
        </script>
    </body>
</html>
